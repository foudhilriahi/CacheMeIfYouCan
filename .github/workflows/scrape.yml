name: Scheduled Scrape & Publish Pages Data

on:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Restore previous scraper DB cache
        id: db-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: data/jobs.db
          key: jobs-db-${{ github.run_id }}
          restore-keys: |
            jobs-db-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        run: npm run scrape

      - name: Export data for GitHub Pages
        run: npm run export

      - name: Keep docs UI in sync with app UI
        run: cp public/index.html docs/index.html

      - name: Save updated scraper DB cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/jobs.db
          key: jobs-db-${{ github.run_id }}

      - name: Commit & push updated pages data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/data/
          git diff --staged --quiet || git commit -m "auto: refresh pages data [skip ci]"
          git push
